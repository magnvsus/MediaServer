events {

}

http {

        proxy_headers_hash_max_size             1024;
        proxy_headers_hash_bucket_size  128;

        server {

          listen        80;
          server_name   example.com www.example.com watch.example.com listen.example.com privacy.example.com drive.example.com;

          return 301 https://$host$request_uri;

        }

        server {
          listen                443 ssl;
          server_name   pi.hole;

          ssl_certificate     /etc/nginx/ssl/pihole-selfsigned.crt;
          ssl_certificate_key /etc/nginx/ssl/pihole-selfsigned.key;

          location / {
            proxy_pass http://<PIHOLE_HOST_IP>:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

        }

        server {
          listen        443 ssl;
          server_name   example.com;

          ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

          location / {

            # Replace with the IP address and port number of your Docker container.
            proxy_pass                          https://linkstack:443/;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;

                proxy_cookie_path /                                     "/; secure";
                proxy_set_header Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload";
                proxy_set_header X-Frame-Options:       "SAMEORIGIN";
                proxy_set_header X-Content-Type-Options:        "nosniff";
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  https;
            proxy_set_header X-VerifiedViaNginx yes;
            proxy_read_timeout                  60;
            proxy_connect_timeout               60;
            proxy_redirect                      off;

            # Specific for websockets: force the use of HTTP/1.1 and set the Upgrade header
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Fixes Mixed Content errors.
            add_header 'Content-Security-Policy' 'upgrade-insecure-requests';
                }

         location /speedtest/ {

                #For html
                #alias  /var/www/html;
                #index openspeedtest.html;

                #For docker
                proxy_pass                                                      https://openspeedtest:3001/;

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;

                proxy_cookie_path /                                     "/; secure";
                proxy_set_header Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload";
                proxy_set_header X-Frame-Options:       "SAMEORIGIN";
                proxy_set_header X-Content-Type-Options:        "nosniff";
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  https;
            proxy_set_header X-VerifiedViaNginx yes;
            proxy_read_timeout                  60;
            proxy_connect_timeout               60;
            proxy_redirect                      off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Forwarded-Proto $scheme;

                }

        }

        server {
          listen                443 ssl;
          server_name   privacy.example.com;

          ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

          location / {
                root /var/www/html;
                index privacy.html;
          }
        }

        server {
          listen                443 ssl;
          server_name   watch.example.com;

          ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

          location / {
                proxy_pass                                                      http://jellyfin:8096/;

                proxy_set_header Host                           $host;
                proxy_set_header X-Real-IP                      $remote_addr;

                proxy_set_header Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload";
        proxy_set_header X-Frame-Options:   "SAMEORIGIN";
        proxy_set_header X-Content-Type-Options:    "nosniff";
                proxy_cookie_path /                                     "/; secure";
                proxy_set_header X-VerifiedViaNginx yes;
        proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto      $scheme;
        proxy_set_header X-Forwarded-Host       $http_host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
          }
        }

        server {
          listen                443 ssl;
          server_name   drive.example.com;

          ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

          location / {
                #nextcloud
                #proxy_pass                                                     http://nextcloud:80/;
                #bewcloud
                proxy_pass                                                      http://cloudreve:5212/;

                proxy_set_header Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload";
        proxy_set_header X-Frame-Options:   "SAMEORIGIN";
        proxy_set_header X-Content-Type-Options:    "nosniff";
                proxy_set_header Host                           $host;
                proxy_set_header X-VerifiedViaNginx yes;
                proxy_cookie_path /                                     "/; secure";
                proxy_set_header X-Real-IP                      $remote_addr;
        proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto      $scheme;
        proxy_set_header X-Forwarded-Host       $http_host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
          }
        }


        server {
          listen                443 ssl;
          server_name   listen.example.com;

          ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

          location / {
                proxy_pass                                                      http://navidrome:4533/;

                proxy_set_header Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload";
        proxy_set_header X-Frame-Options:   "SAMEORIGIN";
        proxy_set_header X-Content-Type-Options:    "nosniff";
                proxy_set_header Host                           $host;
                proxy_set_header X-VerifiedViaNginx yes;
                proxy_cookie_path /                                     "/; secure";
                proxy_set_header X-Real-IP                      $remote_addr;
        proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto      $scheme;
        proxy_set_header X-Forwarded-Host       $http_host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
          }
        }
